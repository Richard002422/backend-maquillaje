name: glowlab_mobile
description: GlowLab — Flutter, Riverpod, GoRouter, Hive, AR (cámara), API REST.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  hive_flutter: ^1.1.0
  http: ^1.3.0
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  # google_mlkit_face_detection: ^0.13.0  # superponer mesh AR; activar con minSdk adecuado
  # flutter_webrtc: ^0.12.12  # solo video en vivo

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
